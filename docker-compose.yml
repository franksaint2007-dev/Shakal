version: "3.9"

services:

 backend:
  build:
   ./backend
  ports:
   - "8000:8000"
  env_file:
   - .env

 frontend:
  build:
   ./frontend
  ports:
   - "3000:3000"

 database:
  image: postgres:16
  environment:
   POSTGRES_DB: scamshield
   POSTGRES_USER: admin
   POSTGRES_PASSWORD: password
  ports:
   - "5432:5432"